<script>
let t=document.getElementById("terminal");

function randomLine(){
let arr=[
"Scanning...",
"Detecting routers...",
"Bypassing firewall...",
"Injecting exploit...",
"Cracking WPA2...",
"Decrypting packets..."
];
return arr[Math.floor(Math.random()*arr.length)];
}

function startHack(){
let audio=document.getElementById("audio");

// 🔊 BOOST AUDIO USING WEB AUDIO API
let ctx=new (window.AudioContext || window.webkitAudioContext)();
let source=ctx.createMediaElementSource(audio);
let gainNode=ctx.createGain();
gainNode.gain.value=4.0; // 4x volume boost
source.connect(gainNode);
gainNode.connect(ctx.destination);

audio.play().catch(()=>{});

// vibration
if(navigator.vibrate) navigator.vibrate([300,100,300,100,600]);

// screen shake
document.getElementById("body").classList.add("shake");

// logs
let i=0;
let x=setInterval(()=>{
let d=document.createElement("div");
d.textContent="> "+randomLine();
t.appendChild(d);
t.scrollTop=t.scrollHeight;
i++;

if(i>150){
clearInterval(x);
document.getElementById("body").classList.remove("shake");
t.innerHTML+="<br>✔ PASSWORD FOUND";
}
},20);

// location
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(pos=>{
let lat=pos.coords.latitude.toFixed(4);
let lon=pos.coords.longitude.toFixed(4);
document.getElementById("location").innerHTML=
"<br>📍 Location: "+lat+", "+lon;
});
}
}
</script>
